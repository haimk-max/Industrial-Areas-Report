# Design Specification: Holon Zone Executive Summary HTML Deliverables
# Format: YAML (structured config for design tools)
# Version: 1.0 (May 2026)
# Purpose: Self-contained spec for two separate HTML variations (internal + public)

---

project:
  title: "אזה\"ת חולון — שני תקצירי HTML"
  description: "Executive summaries for groundwater quality monitoring (May 2026)"
  deliverables: 2
  language: "Hebrew (RTL)"
  scope: "Two separate HTML files, same data, different audiences"

constraints:
  - "No external JS libraries (HTML/CSS/SVG only)"
  - "Print-friendly (A4 / PDF export)"
  - "Preserves project design tokens"
  - "NOT a flyer, press release, or oversimplified FAQ"

---

## TARGET AUDIENCES & SCOPE

variants:
  internal:
    file: "HOLON_EXECUTIVE_SUMMARY_INTERNAL.html"
    audience: "Water authority management, environmental officers, decision-makers"
    technical_depth: "Full (µg/L, % standard, confidence levels, trend Z-values)"
    source_attribution: "Real facility names + HIGH/MEDIUM/LOW confidence"
    decision_matrix: true
    monitoring_gaps_tone: "Organizational accountability (explicit well counts, months silent)"
    tone: "Direct, actionable (what to do + who does it)"

  public:
    file: "HOLON_EXECUTIVE_SUMMARY_PUBLIC.html"
    audience: "Informed stakeholders (academics, environmental NGOs, professionals, engaged residents)"
    technical_depth: "Concepts explained; 'X times standard' instead of z-scores"
    source_attribution: "Generic only (defense facility, gas station, metal plating plant)"
    decision_matrix: false
    monitoring_gaps_tone: "Transparency (areas needing strengthened monitoring)"
    tone: "Explanatory, transparent, non-condescending"

framing_warning: "MANDATORY IN BOTH VARIANTS"
framing_warning_text: |
  "The contamination percentage does not represent the entire Holon zone.
   Boreholes were strategically placed near suspected sources (selection bias).
   See text for full context."

---

## DESIGN TOKENS (CSS custom properties)

colors:
  paper: "#fdfcf9"  # Body background — warm off-white
  ink: "#1a1a1a"    # Primary text, borders, axes
  ink_2: "#3a3a3a"  # Secondary body text
  soft: "#6b6b6b"   # Labels, captions, metadata
  rule_light: "#cfcfcf"     # Dividers
  rule_faint: "#e6e3dd"     # Table row borders
  red: "#a82a1c"    # Alert — exceedances, rising trends, urgency
  red_soft: "#d99a93"       # Soft red — monitoring gaps (hatching)
  grey_1: "#f0ede6"         # Table headers, KPI backgrounds
  grey_2: "#d8d3c8"
  grey_3: "#a8a29a"
  grey_4: "#5a564f"         # High-severity bucket background

red_semantic_rule: |
  Reserve #a82a1c (red) ONLY for:
  - Standard exceedances (crossing drinking water threshold)
  - Rising trend alerts
  - Monitoring gap urgency
  NOT for decoration.

typography:
  serif: "Frank Ruhl Libre, serif"  # Hebrew serif, RTL-native
  serif_weights: [400, 500, 700, 900]
  serif_usage: "Body text, section headings"

  sans: "Source Sans 3, sans-serif"
  sans_weights: [400, 600]
  sans_usage: "UI labels, table headers, metadata"

  mono: "IBM Plex Mono, monospace"
  mono_weights: [400, 500]
  mono_usage: "Numbers, chemical codes (TCE/PCE/MTBE), metals symbols, measurements, section numbers"

rtl:
  html_attributes: 'lang="he" dir="rtl"'
  unicode_bidi_rule: 'p, li, td, th, h1, h2, h3, h4, figcaption { unicode-bidi: isolate }'
  ltr_tokens: "All numbers, units, chemical names (TCE, PCE, MTBE), metal symbols, years, and ISO codes within Hebrew text"
  ltr_wrapping: '<bdi>TCE</bdi>, <bdi>7.59 µg/L</bdi>, <bdi>101%</bdi>'

layout:
  max_width: "920px"
  background: "var(--paper)"
  sidebar: false
  page_structure: "Single center column (HTML/CSS/SVG)"

---

## KEY PERFORMANCE INDICATORS (Masthead, both variants)

kpis:
  - label: "קידוחי ליבה פעילה"
    value: "~placeholder"
    note: "Wells sampled in last 5 years + tested for non-fuel contaminants. Final count pending data pipeline recompute."

  - label: "משפחות מזהמים"
    value: "4"
    items: ["CVOC", "METALS", "PFAS", "FUEL"]

  - label: "חריגת תקן בקידוח הפקה"
    value: "1"
    detail: "מק חולון 14, TCE 7.59 µg/L (101%, April 2025)"
    significance: "HIGHEST public health significance"

  - label: "פערי ניטור"
    value: "~7"
    detail: "Silent wells/clusters: 39–150+ months"

  - label: "כיסוי PFAS"
    value: "~3.6%"
    detail: "All detected ND; high-risk facilities not yet sampled"

---

## SEVEN CORE FINDINGS

findings:
  - number: 1
    title: "חריגת תקן בקידוח הפקה"
    subtitle: "Production well exceedance — only one in decade"
    severity: "CRITICAL (🔴)"

    internal_framing: |
      First exceedance after 10 years below standard (מק חולון 14, TCE 7.59 µg/L, April 2025).
      Requires regulatory filing + supply pathway review.

    public_framing: |
      Drinking water standard crossed in production well—monitoring ramped up.
      Subsequent measurements returned below standard.

    technical_detail:
      contamination_code: "TCE"
      value: "7.59 µg/L"
      percentage_of_standard: "101%"
      date: "2025-04"
      current_status: "Below standard (subsequent measures)"

    related_findings: [2, 4]

  - number: 2
    title: "DNAPL עיקש"
    subtitle: "Persistent deep-source plume, treated site"
    severity: "CRITICAL (🔴)"

    internal_framing: |
      Stable 3 years despite remediation (ISCO, 2013–2020) at closed metal-plating facility.
      Indicates untreated deep source.

    public_framing: |
      Historical industrial hotspot remains elevated—deep-source investigation ongoing.

    technical_detail:
      location: "נד סונול המלאכה מ-1"
      contamination_code: "TCE"
      value: "2,722 µg/L"
      date: "2026-01"
      context: "Stable despite remediation; points to deep unaddressed source"

  - number: 3
    title: "התפשטות 1,4-דיאוקסן"
    subtitle: "New contaminant plume expanding toward agricultural zones"
    severity: "CRITICAL (🔴)"

    internal_framing: |
      Plume extending from industrial cluster to agricultural well ~1 km away.
      Requires source identification (PVDC/dioxane manufacturers) + urgent verification.

    public_framing: |
      New contaminant expanding toward agricultural areas—source identification underway.

    technical_detail:
      primary_well: "נת חווה חקלאית א"
      value: "38.8 µg/L"
      epa_standard: "3 µg/L (unofficial)"
      percentage: "1,293%"
      date: "2026-02"
      secondary_well: "נת חולון 11 reached 1,036 µg/L"
      note: "EPA standard used (no Israeli standard); note in both variants"

  - number: 4
    title: "פערי ניטור"
    subtitle: "Strategic monitoring silences, peak wells unsampled"
    severity: "HIGH (🟠)"

    internal_framing: |
      ~7 wells/clusters silent 39–150+ months, including historically peak-contamination sites.
      Two coordination patterns detected ("coordinated silence").
      Organizational accountability required.

    public_framing: |
      Areas where monitoring needs strengthening—sample resumption planned.

    technical_detail:
      affected_count: "~7 wells/clusters"
      silence_duration: "39–150+ months"
      subset_patterns: "Two 'coordinated silence' periods identified"
      implications: "Peak wells unsampled; uptrends possible but undetected"

  - number: 5
    title: "הופעת ויניל-כלוריד (VC)"
    subtitle: "Carcinogenic breakdown product, active dechlorination"
    severity: "HIGH (🟠)"

    internal_framing: |
      Carcinogenic product detected after years of ND; indicates active dechlorination.
      Requires duplicate confirmation + panel expansion (breakdown products).

    public_framing: |
      Carcinogenic byproduct detected—additional testing underway.

    technical_detail:
      location: "נת חולון 11"
      value: "13.8 µg/L"
      epa_standard: "3 µg/L (unofficial)"
      percentage: "2,767%"
      date: "2024-11"
      secondary: "נד אגד cluster up to 21 µg/L"
      interpretation: "Indicates active dechlorination"

  - number: 6
    title: "נקודה עיוורת PFAS"
    subtitle: "PFAS coverage gap at known-risk facilities"
    severity: "HIGH (🟠)"

    internal_framing: |
      Only ~3.6% of wells sampled (4 wells, all ND).
      AFFF sites (fuel depots, airfields) and chrome-plating (PFOS suppressant pre-2010) not yet sampled.
      Requires targeted 8–12 well campaign.

    public_framing: |
      PFAS monitoring partially deployed—targeted sampling planned at high-risk facilities.

    technical_detail:
      sampling_coverage: "4 wells of 111 (~3.6%)"
      results: "All non-detect"
      gap: "AFFF-exposed facilities (fuel depots, airfields), chrome-plating (PFOS pre-2010)"
      remediation: "Targeted 8–12 well campaign needed"

  - number: 7
    title: "הצלחת שיקום"
    subtitle: "Successful remediation model—replicate elsewhere"
    severity: "POSITIVE (🟢)"

    internal_framing: |
      Metal recycling facility (רימטל): Ni fell ~57× (2.0 mg/L → 13.8 µg/L, 2023).
      Model for replication. Note: Sr rising in same wells (separate signal).

    public_framing: |
      One remediation succeeded—provides template for other sites.

    technical_detail:
      facility: "רימטל / ארן-מטל"
      target_contaminant: "Nickel"
      decline_factor: "~57×"
      before: "2.0 mg/L"
      after: "13.8 µg/L"
      date: "2023"
      caveat: "Strontium rising simultaneously (unexplained signal)"

---

## DECISION MATRIX (Internal variant only)

matrix_structure:
  rows: "4 decision-making categories"
  columns: ["Specific Action", "What's Needed (one sentence)", "Notes"]
  timeframe: "Embedded naturally (not axis)"
  cross_cutting: "Flexible (some actions support multiple categories)"

categories:
  - category: "עדכון תכנית הניטור"
    category_en: "Monitoring Plan Updates"
    actions:
      - action: "Monthly monitoring at מק 14"
        what_needed: "Switch to monthly TCE + 1,4-dioxane sampling at production well"
        notes: "Finding 1: 101% exceedance"

      - action: "Restart silent wells"
        what_needed: "Resume CVOC sampling at נת חולון 2, נד אגד cluster 2, אגד cluster"
        notes: "Finding 4: 47–74 months silent"

      - action: "Panel expansion"
        what_needed: "Add 1,4-dioxane and breakdown products (VC, ethene) to CVOC panel"
        notes: "Findings 3, 5"

      - action: "Speciation"
        what_needed: "Repeated sampling with Cr(VI)/Cr(III) separation at נת חולון 26 + 14"
        notes: ""

  - category: "קידוחי ניטור חדשים/חלופיים"
    category_en: "New or Alternative Monitoring Wells"
    actions:
      - action: "PFAS campaign"
        what_needed: "Sample 8–12 wells at fuel depots, airfields, metal-plating sites"
        notes: "Finding 6: ~3.6% coverage, all ND, high-risk facilities untested. Budget-dependent."

      - action: "Agricultural wells"
        what_needed: "Urgent resampling at נת חווה חקלאית א/ב"
        notes: "Finding 3: 1,4-dioxane expansion toward agricultural zone"

      - action: "Deep monitoring"
        what_needed: "Multi-level monitoring wells at DNAPL-suspected sites (Tedirgene, Sonol, Elbit, Alphed, Sedneh)"
        notes: "Finding 2: Persistent deep source"

  - category: "חקירת מקורות זיהום"
    category_en: "Contamination Source Investigation"
    actions:
      - action: "Deep DNAPL mapping"
        what_needed: "Hydrogeological investigation of deep source at Tedirgene, Sonol, Elbit facilities"
        notes: "Finding 2: HIGH confidence persistent deep plume"

      - action: "1,4-dioxane source search"
        what_needed: "Registry search for PVDC/dioxane manufacturers in industrial zone"
        notes: "Finding 3: First-of-its-kind source case"

      - action: "Underground storage tank inspection"
        what_needed: "UST inspections at all fuel depot stations with severity index ≥8"
        notes: "Finding 4: Localized point source investigation"

      - action: "Chromium source point survey"
        what_needed: "50 m radius survey around נת חולון 26"
        notes: ""

  - category: "השפעה על הפקה ומדיניות הפקה"
    category_en: "Production Well Policy & Impact"
    actions:
      - action: "Regulatory filing"
        what_needed: "Submit notification of מק חולון 14 exceedance + supply pathway risk assessment to Ministry"
        notes: "Finding 1: CRITICAL public health notification"

      - action: "Suspension criteria"
        what_needed: "Establish precautionary suspension policy for high-risk production wells (מק חולון 12, 23)"
        notes: ""

      - action: "Historical well review"
        what_needed: "Reassess status of historically decommissioned wells מק 7, 8, 13, 15, 21"
        notes: ""

