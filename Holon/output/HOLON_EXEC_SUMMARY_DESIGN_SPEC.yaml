## VALIDATION CHECKLIST (Design Tool Integration)

checklist:
  - "[ ] Both HTML files valid (no JS errors, loads in modern browsers)"
  - "[ ] RTL layout correct (text right-to-left, meta elements properly nested <bdi> tags)"
  - "[ ] Design tokens applied (colors, fonts, sizing match spec)"
  - "[ ] KPI cards render correctly (4 KPIs in internal, 3-4 in public)"
  - "[ ] Seven findings cards render with correct colors (🔴 red, 🟠 orange, 🟢 green)"
  - "[ ] Decision matrix (internal only): 4 categories × 3-4 columns visible"
  - "[ ] Internal file: Real facility names + confidence levels shown"
  - "[ ] Public file: Only generic categories shown; no proper names visible"
  - "[ ] Framing warning present and visible in both files"
  - "[ ] Print preview (A4): No overflow, headers on each page, figures included"
  - "[ ] Accessibility: Color not sole indicator; labels semantic"
  - "[ ] Mobile responsive (if required): Single column layout stacks cleanly"

