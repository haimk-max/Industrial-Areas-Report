## FORWARD PRINCIPLES

decision_framework_in_v5: |
  The 4-category decision framework defined in §6 (above) will be adopted
  as the secondary organizing principle for the main V5 zone reports.
  The primary narrative remains story-driven analytical; §6 (Recommendations)
  formalizes around these 4 decision domains. See ZONE_REPORT_PROCESS_GUIDE.md
  and REPORT_V5_SCHEMA.md for integration into V5 hybrid pipeline.

well_counting_methodology: |
  Methodology clarified for implementation in data pipeline:
  1. CSV stage (deterministic): Filter for wells sampled in last 5 years;
     add boolean flag "has_non_fuel_analyses" (CVOC/metals/PFAS).
  2. LLM stage (analytical): Classify "core active" vs. historical/fuel-only.
  The final well count will be computed after data pipeline rerun.
  See DATA_PIPELINE_SPEC.md §2.

