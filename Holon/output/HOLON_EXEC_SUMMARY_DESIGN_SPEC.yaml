## PAGE STRUCTURES

internal_structure:
  file: "HOLON_EXECUTIVE_SUMMARY_INTERNAL.html"
  sections:
    1: "Masthead — 'אזה\"ת חולון · תקציר מנהלים · מאי 2026' + Classification (פנימי) + meta-chips (well count, families, date)"
    2: "Summary paragraph — 3 sentences"
    3: "KPI cards — 3–4 cards (exceedances / PFAS coverage / monitoring gaps)"
    4: "Seven findings — Color-coded cards per severity; each: data + confidence + internal framing"
    5: "Decision matrix — Full 4×3 table (decision categories, actions, what's needed, notes)"
    6: "ITM map (optional) — Boreholes colored by severity index"

public_structure:
  file: "HOLON_EXECUTIVE_SUMMARY_PUBLIC.html"
  sections:
    1: "Masthead — 'איכות מי-התהום באזה\"ת חולון · 2026' + 'דוח שקיפות'"
    2: "Context paragraph — Old industrial zone, active monitoring, most water clean, historical hotspots under surveillance + framing warning"
    3: "Timeline narrative — Historical contamination → successful remediation ✅ → persistent hotspots → new contamination detected in time"
    4: "Seven findings — Public framing only, generic source attribution"
    5: "Heat map — Wells colored by severity, NO facility names"
    6: "Implications & next steps — 'What this means + what comes next' (no 'who is responsible', no budget specifics)"

