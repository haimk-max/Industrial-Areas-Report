# ─── INTERNAL §00 ───────────────────────────────────────────────────
bottom_line:
  - "אזה״ת חולון הוא <strong>המורכב שבמערך הניטור</strong>: שלוש משפחות מזהמים פעילות בו-זמנית — <bdi>CVOC</bdi>, דלק (<bdi>BTEX/MTBE</bdi>) ומתכות — בתוספת מזהם מתפתח (<bdi>1,4-dioxane</bdi>). מתוך <bdi>111</bdi> קידוחים ב-<bdi>7</bdi> מוקדים גיאו-כימיים, שלושה מגיעים לאינדקס חומרה מרבי (<bdi>8</bdi>): ליבת <bdi>CVOC</bdi> בעוצמת <bdi>DNAPL</bdi>, בנזן <span class=\"red\"><bdi>85,000%</bdi></span> מהתקן במחניון אגד, ושחרור-טרי פעיל בתחנות דלק דרומיות."
  - "באפריל <bdi>2025</bdi> חצה קידוח ההפקה <strong>מק חולון <bdi>14</bdi></strong> לראשונה זה עשור את תקן <bdi>TCE</bdi> (<span class=\"red\"><bdi>101%</bdi></span>) — חמישה קידוחי הפקה כבר נפסלו היסטורית. במקביל, מערך הניטור מציג <strong>פערים שיטתיים</strong> — שבעה קידוחים שותקים <bdi>39–150+</bdi> חודשים; כיסוי <bdi>PFAS</bdi> עומד על <span class=\"red\"><bdi>~3.6%</bdi></span> בלבד."
  - "נדרשת פעולה מתואמת בארבעה צירים: <span class=\"teal\">עדכון תכנית הניטור</span>, <span class=\"teal\">קידוחים חדשים</span>, <span class=\"teal\">חקירת מקורות</span>, ו<span class=\"teal\">מדיניות הפקה</span> — כמפורט במטריקס ההחלטות בסעיף §<bdi>05</bdi>."

# ─── PUBLIC §01 ────────────────────────────────────────────────────
context_intro:
  - "אזור התעשייה של חולון הוא מהוותיקים בארץ — פעיל מאז שנות ה-<bdi>40</bdi>, ומכיל היסטוריה תעשייתית מגוונת: מפעלי ציפוי מתכות, אלקטרוניקה, מתקני דלק, מחזור, טקסטיל וכימיקלים. רוב מקורות הזיהום הגדולים נסגרו לפני <bdi>20–40</bdi> שנים, אך טביעתם ההיסטורית עדיין מורגשת בקרקע ובמי-התהום."
  - "כיום אנחנו מפעילים מערך ניטור של <strong><bdi>111</bdi> קידוחים</strong> — <bdi>46</bdi> לניטור כללי ו-<bdi>63</bdi> לניטור דלק — הרחב פי שבעה ממערך <bdi>2021</bdi>. הדוח הזה מסכם חמש שנות ניתוח (<bdi>2021–2026</bdi>): רוב הקידוחים תקינים, אך בשבעה מוקדים גיאוגרפיים זוהו ריכוזי מזהמים שאנחנו עוקבים אחריהם בצמוד."
  - "המסמך נכתב במחויבות לשקיפות: אנו מציגים את <strong>מה שמצאנו</strong>, את <strong>מה שעדיין לא יודעים</strong>, ואת <strong>מה שאנחנו עושים</strong> — ללא הסתרה."

# ─── Both reports — selection bias caveat ───────────────────────────
framing_warning: >
  שיעור החריגות אינו מייצג את כלל מרחב חולון — קידוחי הניטור מוקמו בכוונה ליד מקורות זיהום
  חשודים (הטיית-בחירה). אין להסיק מהמדגם הזה לאיכות מי-התהום הכללית.

