# ─── PUBLIC §05 — What it means · what we do ────────────────────────
means_summary:
  - label: "סיכום · א"
    title: "תמונה מורכבת, לא דרמטית — אבל גם לא רגועה"
    body: "<p>רוב המים באזה״ת חולון תקינים. אבל בשבעה מוקדים גיאוגרפיים מובחנים זוהו ריכוזי מזהמים שדורשים מעקב צמוד: <strong>מוקדי ממסים תעשייתיים</strong> בעוצמה גבוהה, <strong>מוקדי דלק פעילים</strong> עם חתימת מוצר חופשי, ו<strong>מזהם חדש</strong> שמתפשט לעבר אזור חקלאי.</p><p>אנחנו לא מתעלמים מאף אחד מהם. הדוח הזה הוא הניסיון שלנו להציג את התמונה כפי שהיא — <bdi>111</bdi> קידוחים, שבעה מוקדים, כ-<bdi>15,000</bdi> מדידות.</p>"

  - label: "סיכום · ב"
    title: "מה אנחנו עושים מעכשיו"
    body: "<ul><li>חידוש דיגום בכל הקידוחים שלא נדגמו לאחרונה — ביטול 'פערי השתיקה'.</li><li>קמפיין PFAS ממוקד באזורים שעדיין לא נדגמו.</li><li>הגברת ניטור בקידוח האספקה שחצה את התקן, ובחינת קידוחים סמוכים.</li><li>חקירת מקור פלאום ה-1,4-דיאוקסן ואיתורו במרשם התעשייה.</li><li>חקירת מוצר דלק חופשי במתחם התדלוק המערבי ובדיקת מכלים בדרום.</li><li>הוספת תוצרי פירוק נוספים לפאנל בדיקות הקבוע.</li><li>תיעוד מודל ההצלחה של אתר מחזור מתכות משוקם והחלתו על אתרים דומים.</li></ul>"

  - label: "סיכום · ג"
    title: "מה הדוח הזה לא אומר"
    body: "<p>הדוח <strong>אינו</strong> מסקנה לגבי המים שזורמים בברז שלכם. רוב המים באזור עוברים תהליכי טיפול, ובדיקות איכות מתבצעות בנקודות אספקה נפרדות.</p><p>הדוח גם <strong>אינו תחליף</strong> למסמכים מקצועיים מלאים — הוא תקציר. מי שמעוניין בנתונים גולמיים מוזמן לפנות אלינו.</p>"

  - label: "סיכום · ד"
    title: "למה לפרסם דוח כזה"
    body: "<p>מי-תהום הוא משאב ציבורי. ניטור איכותו ממומן מכספי ציבור, והממצאים שייכים לציבור.</p><p>שקיפות במצב הסביבה היא חלק מהמחויבות שלנו, גם — ובמיוחד — כשהממצאים אינם נוחים. דוח זה הוא צעד אחד בכיוון הזה, ולא אחרון.</p>"

# ─── PUBLIC §06 — Methodology ───────────────────────────────────────
methodology:
  - title: "מקור הנתונים"
    body:  "מסד נתוני הניטור של רשות המים, אגף מי-תהום. 111 קידוחים, כ-15,170 מדידות, חלון ניתוח 02/2021 – 02/2026."
  - title: "קריטריון השוואה"
    body:  "תקנות מי-שתייה (2013) לישראל. עבור מזהמים ללא תקן ישראלי, השוואה לתקני EPA אמריקאיים."
  - title: "חישוב חומרה"
    body:  "מבוסס על C_max ב-5 השנים האחרונות, כאחוז מהתקן. ערכים מוצגים בפועל, לא מעובדים סטטיסטית."

