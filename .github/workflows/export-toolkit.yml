name: Export Toolkit to ground-water-quality-toolkit

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout toolkit-standalone branch
        uses: actions/checkout@v4
        with:
          ref: toolkit-standalone
          fetch-depth: 0

      - name: Push to ground-water-quality-toolkit
        env:
          PAT: ${{ secrets.TOOLKIT_PAT }}
        run: |
          git config user.email "haimk@water.gov.il"
          git config user.name "GitHub Actions"
          git remote add toolkit https://haimk-max:${PAT}@github.com/haimk-max/ground-water-quality-toolkit.git
          echo "Remote added. Testing connectivity..."
          git ls-remote toolkit || echo "ls-remote failed — check PAT or repo name"
          echo "Pushing..."
          git push toolkit HEAD:main --force
          echo "Done."
