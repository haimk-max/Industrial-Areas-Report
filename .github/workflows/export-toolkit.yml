name: Export Toolkit to ground-water-quality-toolkit

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout toolkit-standalone branch
        uses: actions/checkout@v4
        with:
          ref: toolkit-standalone
          fetch-depth: 0

      - name: Verify repo exists and PAT works
        env:
          GH_TOKEN: ${{ secrets.TOOLKIT_PAT }}
        run: |
          echo "Checking access to target repo..."
          gh repo view haimk-max/ground-water-quality-toolkit || echo "ERROR: cannot access repo"

      - name: Push to ground-water-quality-toolkit
        env:
          GH_TOKEN: ${{ secrets.TOOLKIT_PAT }}
        run: |
          git remote add toolkit https://x-access-token:${{ secrets.TOOLKIT_PAT }}@github.com/haimk-max/ground-water-quality-toolkit.git
          git push toolkit HEAD:main --force --verbose
